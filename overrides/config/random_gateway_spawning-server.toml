#Turn on debug mode
debug_mode = true
#Spawn rate percentage (1–100). Used if spawn_day is 0
# Default: 20
# Range: 1 ~ 100
spawn_rate = 3
#Force gate spawn after this in-game day. If set above 0, overrides spawn_rate and guarantees 100% spawn
# Default: 0
# Range: > 0
spawn_day = 0
#A list of gates to be spawned
gates = ["gateways:basic/blaze", "gateways:basic/enderman", "gateways:basic/slime", "gateways:emerald_grove", "gateways:endless/blaze", "gateways:hellish_fortress", "gateways:overworldian_nights"]
