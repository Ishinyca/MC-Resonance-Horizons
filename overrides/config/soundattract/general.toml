#Sound Attract Mod - General Configuration
[general]
	#Enable debug logging for troubleshooting.
	debugLogging = false
	#Enable datapack-based configuration.
	enableDataDriven = true
	#Controls precedence when both datapacks and config define entries.
	datapackPriority = "datapack_over_config"
	#Enable mobs fleeing after being hurt by unseen attacker.
	enableFleeFromUnseenAttackerGoal = true
	#Switching threshold factor.
	# Default: 0.5
	# Range: 0.0 ~ 1.0
	soundSwitchRatio = 0.5
	#Novelty weight bonus.
	# Default: 9.5
	# Range: 0.0 ~ 10.0
	soundNoveltyBonusWeight = 9.5
	#How long a sound is considered 'new'.
	# Default: 100
	# Range: 1 ~ 200
	soundNoveltyTimeTicks = 100
	#Internal schema version for config migrations. Do not change.
	# Default: 17
	# Range: > 0
	configSchemaVersion = 17

[player_action_sounds]
	#[DEPRECATED as of 6.3.3] Moved to soundattract/server-rules.toml (SERVER config).
	#The value here is no longer read at runtime; kept only so existing config files do not error.
	enablePlayerActionSounds = true
	#[DEPRECATED as of 6.3.3] Moved to soundattract/server-rules.toml (SERVER config).
	#The value here is no longer read at runtime; kept only so existing config files do not error.
	playerActionRanges = ["CRAWLING;3", "SNEAKING;5", "WALKING;10", "SPRINTING;16", "SPRINT_JUMPING;20"]
	#[DEPRECATED as of 6.3.3] Moved to soundattract/server-rules.toml (SERVER config).
	#The value here is no longer read at runtime; kept only so existing config files do not error.
	playerActionWeights = ["CRAWLING;1.0", "SNEAKING;1.0", "WALKING;1.0", "SPRINTING;1.0", "SPRINT_JUMPING;1.0"]
	#[DEPRECATED as of 6.3.3] Moved to soundattract/server-rules.toml (SERVER config).
	#The value here is no longer read at runtime; kept only so existing config files do not error.
	# Default: 24.0
	# Range: 0.0 ~ 512.0
	playerActionCheckRadius = 24.0

