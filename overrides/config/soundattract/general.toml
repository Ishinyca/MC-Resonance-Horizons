[groups]
	# Default: 64
	# Range: 1 ~ 128
	maxGroupSize = 64
	# Default: 64.0
	# Range: 1.0 ~ 128.0
	leaderGroupRadius = 64.0
	# Default: 128.0
	# Range: 1.0 ~ 256.0
	groupDistance = 128.0
	# Default: 1.0
	# Range: 0.1 ~ 10.0
	leaderSpacingMultiplier = 1.0
	# Default: 4
	# Range: 1 ~ 64
	numEdgeSectors = 4
	# Default: 200
	# Range: 1 ~ 20000
	groupUpdateInterval = 200
	# Default: 16
	# Range: 1 ~ 64
	maxLeaders = 16
	#If true, mobs skip sound scanning when they already have a live attack target. Dramatically reduces lag when mobs chase a player who fires a gun.
	skipSoundScanWhenHasTarget = true
	#Maximum number of muffling raycasts allowed per server tick. Prevents lag spikes from too many simultaneous muffling calculations. Set to 0 for unlimited.
	# Default: 50
	# Range: 0 ~ 10000
	maxMufflingRaycastsPerTick = 50

[muffling]
	#Enable/disable block muffling effects on sound range/weight.
	enableBlockMuffling = true
	#Sound muffling factor for wool blocks. Default: 0.75
	# Default: 0.75
	# Range: 0.0 ~ 1.0
	mufflingFactorWool = 0.75
	#Sound muffling factor for solid blocks. Default: 0.85
	# Default: 0.85
	# Range: 0.0 ~ 1.0
	mufflingFactorSolid = 0.85
	#Sound muffling factor for non-solid blocks. Default: 0.93
	# Default: 0.93
	# Range: 0.0 ~ 1.0
	mufflingFactorNonSolid = 0.93
	#Sound muffling factor for thin blocks (e.g., carpets, panes). Default: 0.95
	# Default: 0.95
	# Range: 0.0 ~ 1.0
	mufflingFactorThin = 0.95
	#Sound muffling factor for liquid blocks. Default: 0.5
	# Default: 0.5
	# Range: 0.0 ~ 1.0
	mufflingFactorLiquid = 0.5
	#Sound muffling factor for air blocks. Default: 1.0
	# Default: 1.0
	# Range: 0.0 ~ 1.0
	mufflingFactorAir = 1.0
	customWoolBlocks = []
	customSolidBlocks = []
	customNonSolidBlocks = []
	customThinBlocks = []
	customLiquidBlocks = []
	customAirBlocks = []

[legacy_profiles]
	#Legacy special mob profiles. Migrated to the new profile system.
	specialMobProfilesRaw = []
	#Legacy special player profiles. Migrated to the new profile system.
	specialPlayerProfilesRaw = []

[floor_creek]
	#Enable wooden floor creak sounds when players move on wood flooring.
	enableFloorCreek = true
	#Probability per step for swimming/crawling pose on wood.
	# Default: 0.4
	# Range: 0.0 ~ 1.0
	floorCreekProbSwimmingCrawling = 0.4
	# Default: 0.3
	# Range: 0.0 ~ 1.0
	floorCreekProbSneaking = 0.3
	# Default: 0.2
	# Range: 0.0 ~ 1.0
	floorCreekProbWalking = 0.2
	# Default: 0.8
	# Range: 0.0 ~ 1.0
	floorCreekProbSprinting = 0.8
	#Probability applied on both jump takeoff and landing when on wood.
	# Default: 0.8
	# Range: 0.0 ~ 1.0
	floorCreekProbJump = 0.8
	#Horizontal distance (blocks) between pose-probability rolls while moving on wood.
	# Default: 2.0
	# Range: 0.1 ~ 64.0
	floorCreekDistanceStep = 2.0

[arrow_investigation]
	#Enable mobs investigating the origin of nearby arrows.
	enableArrowInvestigation = true
	#Blocks. Distance from arrow's flight segment that triggers near-miss detection.
	# Default: 3.0
	# Range: 0.0 ~ 64.0
	arrowNearMissRadius = 3.0
	#Blocks. Radius around arrow impact point that triggers landing detection.
	# Default: 6.0
	# Range: 0.0 ~ 64.0
	arrowImpactRadius = 6.0
	#Blocks. Random +/- XZ offset applied to the resolved arrow origin.
	# Default: 6
	# Range: 0 ~ 128
	arrowInvestigationOffset = 6
	#Ticks. Per-mob cooldown between arrow investigations.
	# Default: 40
	# Range: 0 ~ 24000
	arrowInvestigationCooldownTicks = 40
	#Blocks. Max distance to reverse-extrapolate arrow origin when owner is unknown.
	# Default: 64.0
	# Range: 0.0 ~ 256.0
	arrowReverseExtrapolateMaxDistance = 64.0
	#Skip investigation if mob already has a combat or sound target.
	arrowInvestigationRespectCurrentTarget = true
	#Config-level allowlist of projectile entity ids that trigger mob investigation.
	#Unioned with the entity-type tag #soundattract:investigate_projectiles.
	investigateProjectileIds = ["minecraft:arrow", "minecraft:spectral_arrow", "minecraft:trident", "minecraft:snowball", "minecraft:egg", "minecraft:ender_pearl", "minecraft:experience_bottle", "minecraft:potion", "minecraft:fireball", "minecraft:small_fireball", "minecraft:dragon_fireball", "minecraft:wither_skull", "minecraft:shulker_bullet", "minecraft:llama_spit"]
