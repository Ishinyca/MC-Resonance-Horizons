#Performance and optimization settings
[performance]
	#Maximum number of sound sources tracked per world.
	# Default: 2048
	# Range: 1 ~ 1000000
	maxSoundsTracked = 2048
	#Delay in ticks before the first mob group computation is run after server startup.
	# Default: 50
	# Range: 0 ~ 72000
	initialGroupComputationDelay = 50
	#Number of background worker threads used for off-thread computations (e.g., group building).
	# Default: 2
	# Range: 1 ~ 64
	workerThreads = 2
	#Soft per-task time budget in milliseconds for worker computations before yielding.
	# Default: 10
	# Range: 1 ~ 1000
	workerTaskBudgetMs = 10
	#Minimum time in ticks between mob scans for new sounds.
	# Default: 25
	# Range: 1 ~ 1000000
	scanCooldownTicks = 25
	#How many ticks to add to the base scan cooldown for each active mob.
	# Default: 0.15
	# Range: 0.0 ~ 10.0
	cooldownTicksPerMob = 0.15
	#TPS below which scanCooldownTicks is dynamically increased. 0 to disable.
	# Default: 15.0
	# Range: 0.0 ~ 20.0
	minTpsForScanCooldown = 15.0
	#TPS above which scanCooldownTicks is dynamically decreased. 21 to disable.
	# Default: 19.0
	# Range: 0.0 ~ 21.0
	maxTpsForScanCooldown = 19.0
	#Enable tiered stealth performance scaling based on TPS.
	enableTieredStealthPerformance = true
	# Default: 19.0
	# Range: 0.0 ~ 21.0
	stealthTierSkipExpensiveChecksTps = 19.0
	# Default: 18.0
	# Range: 0.0 ~ 21.0
	stealthTierCurrentTargetsOnlyTps = 18.0
	# Default: 17.0
	# Range: 0.0 ~ 21.0
	stealthTierSharedRangeTps = 17.0
	# Default: 15.0
	# Range: 0.0 ~ 21.0
	stealthTierVanillaTps = 15.0
	# Default: 16.0
	# Range: 0.0 ~ 256.0
	stealthShareTargetToNearbyMobsRadius = 16.0
	#Cooldown per mob between async sound scoring submissions.
	# Default: 1
	# Range: 0 ~ 10000
	soundScoringSubmitCooldownTicks = 1
	#Time-to-live for cached async sound scoring results.
	# Default: 10
	# Range: 1 ~ 10000
	asyncResultTtlTicks = 10
	#Enable caching for raycast results.
	enableRaycastCache = true
	# Default: 200
	# Range: 1 ~ 1000000
	raycastCacheTtlTicks = 200
	# Default: 5000
	# Range: 100 ~ 1000000
	raycastCacheMaxEntries = 5000
	enableOptimizedLos = true
	enableOptimizedLosPairCache = true
	# Default: 8192
	# Range: 256 ~ 1000000
	optimizedLosPairCacheMaxEntries = 8192
	enableOptimizedLosVanillaFallback = true
	enableLosBatching = true
	# Default: 64
	# Range: 1 ~ 1000000
	losBatchBudgetPerTick = 64
	# Default: 4096
	# Range: 64 ~ 1000000
	losBatchQueueMaxSize = 4096
	enableLivingEntityLosOverride = true
	#Maximum number of blocks to check for muffling between sound and mob.
	# Default: 16
	# Range: 8 ~ 256
	maxMufflingBlocksToCheck = 16
	#Maximum number of entries in internal tracking caches (e.g. stealth/scent memory) before oldest are evicted. Protects server RAM.
	# Default: 10000
	# Range: 100 ~ 1000000
	globalCacheMaxSize = 10000
	#Time in minutes before an offline player or dead mob's data is naturally purged from memory.
	# Default: 5
	# Range: 1 ~ 1440
	globalCacheExpireMins = 5
